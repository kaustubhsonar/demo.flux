apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: deploy-nginx
  namespace: flux-system
spec:
  interval: 5m
  path: "./flux"
  prune: true
  sourceRef:
    kind: GitRepository
    name: demo-flux
    namespace: flux-system
  validation: client
  # optional: targetNamespace controls where namespace-scoped resources are applied;
  # HelmRelease has targetNamespace set to default already.
  # targetNamespace: default
