apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-nginx-svc" .Release.Name }}
  labels:
    app: {{ printf "%s-nginx" .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ printf "%s-nginx" .Release.Name }}
